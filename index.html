<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Love Letter</title>
    <style>
        :root {
            --color-env: #ffb7b2;
            --color-env2: #ff9aa2;
            --color-letter: #ffffff;
            --color-heart: #ff4d6d;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden; /* Prevents scrollbars from falling hearts */
        }

        .envelop-wrapper {
            position: relative;
            cursor: pointer;
            z-index: 10;
        }

        #open {
            display: none;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--color-env);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: "";
            position: absolute;
            z-index: 2;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--color-env2);
            border-bottom: 100px solid var(--color-env2);
            border-left: 150px solid var(--color-env);
        }

        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--color-env2);
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 3;
        }

        .letter {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 280px;
            height: 180px;
            background: var(--color-letter);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.4s ease;
            z-index: 1;
        }

        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            background: var(--color-heart);
            z-index: 4;
            transform: translate(-50%, -20%) rotate(45deg);
            transition: transform 0.4s ease;
        }

        .heart:before, .heart:after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--color-heart);
            border-radius: 50%;
        }

        .heart:before { top: -15px; left: 0; }
        .heart:after { left: -15px; top: 0; }

        /* Animation Logic */
        #open:checked + .envelop-wrapper .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        #open:checked + .envelop-wrapper .letter {
            transform: translateY(-100px);
            z-index: 2;
        }

        #open:checked + .envelop-wrapper .heart {
            transform: translate(-50%, -150px) rotate(45deg) scale(0.5);
            opacity: 0;
        }

        /* Falling Hearts Styles */
        .falling-heart {
            position: fixed;
            top: -10px;
            color: var(--color-heart);
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <input type="checkbox" id="open" onchange="toggleHearts(this)">
    
    <label class="envelop-wrapper" for="open">
        <div class="envelope">
            <div class="flap"></div>
            <div class="letter">
                <p>My Zayney,</p>
                <p>Congrats! I am so proud of you on finishing your last exam at OTU! xx, Bug.</p>
                <p>❤️</p>
            </div>
            <div class="heart"></div>
        </div>
    </label>

    <script>
        let heartInterval;

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's'; // Between 2-5 seconds
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            
            document.body.appendChild(heart);

            // Remove heart after it falls to keep the page clean
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        function toggleHearts(checkbox) {
            if (checkbox.checked) {
                // Start creating hearts every 300ms
                heartInterval = setInterval(createHeart, 300);
            } else {
                // Stop creating hearts
                clearInterval(heartInterval);
            }
        }
    </script>

</body>
</html>
